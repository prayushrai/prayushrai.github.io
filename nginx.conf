# nginx config for the Railway deployment.
# ${PORT} is replaced at container startup by the nginx-alpine entrypoint;
# bare $vars (like $uri) are left literal so nginx evaluates them at request time.

server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # Hide infra files from the public site
    # (they end up in the web root because the COPY at the top of the Dockerfile
    # is broad — easier than maintaining an explicit allowlist of runtime files).
    location ~ ^/(nginx\.conf|Dockerfile|\.dockerignore|CNAME)$ {
        deny all;
        return 404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|svg)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
